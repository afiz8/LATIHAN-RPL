<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login & Absensi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}
.container{
    margin-top:50px;
}
input,button{
    padding:10px;
    margin:5px;
}
.hidden{display:none;}
table{
    margin:auto;
    background:white;
    color:black;
    border-collapse: collapse;
}
td,th{
    border:1px solid black;
    padding:8px;
}
</style>
</head>

<body>

<div class="container" id="auth">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<div class="container hidden" id="app">
    <h2 id="welcome"></h2>

    <input id="nama" placeholder="Nama">
    <button onclick="tambah()">Tambah Absen</button>
    <button onclick="logout()">Logout</button>

    <br><br>

    <table id="tabel"></table>
</div>

<script>

// ===== BACKEND URL =====
const BASE_URL = "https://cbf1487d-f619-4cdc-8f65-954cc75751c0-00-27ker2816xs3s.sisko.replit.dev";

// ===== ELEMENT =====
const user = document.getElementById("username");
const pass = document.getElementById("password");
const msg = document.getElementById("msg");
const auth = document.getElementById("auth");
const app = document.getElementById("app");
const welcome = document.getElementById("welcome");
const nama = document.getElementById("nama");
const tabel = document.getElementById("tabel");

// ===== SESSION =====
function setSession(u){
    localStorage.setItem("session",u);
}
function getSession(){
    return localStorage.getItem("session");
}

// ===== LOGIN (BACKEND CONNECT) =====
async function login(){
    try{
        let u = user.value.trim();
        let p = pass.value.trim();

        if(!u || !p){
            msg.innerText = "Isi username & password!";
            return;
        }

        let res = await fetch(BASE_URL + "/login", {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                username: u,
                password: p
            })
        });

        let data = await res.json();

        if(data.status === "success"){
            setSession(u);
            msg.innerText = "";
            startApp();
        }else{
            msg.innerText = "Login gagal!";
        }

    }catch(e){
        msg.innerText = "Server error! (cek backend)";
    }
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// ===== START APP =====
function startApp(){
    if(!getSession()) return;

    auth.classList.add("hidden");
    app.classList.remove("hidden");

    welcome.innerText = "Welcome, " + getSession();
    loadData();
}

// ===== DATA LOCAL (ABSEN) =====
function getData(){
    return JSON.parse(localStorage.getItem("absen")) || [];
}
function saveData(d){
    localStorage.setItem("absen", JSON.stringify(d));
}

// ===== TAMBAH =====
function tambah(){
    let n = nama.value.trim();
    if(!n) return alert("Nama wajib diisi!");

    let data = getData();

    if(data.find(d => d.nama.toLowerCase() === n.toLowerCase())){
        return alert("Nama sudah absen!");
    }

    data.push({
        nama:n,
        waktu:new Date().toLocaleString()
    });

    saveData(data);
    nama.value="";
    loadData();
}

// ===== HAPUS =====
function hapus(i){
    let data = getData();
    data.splice(i,1);
    saveData(data);
    loadData();
}

// ===== LOAD TABLE =====
function loadData(){
    let data = getData();

    let html = `
    <tr>
        <th>Nama</th>
        <th>Waktu</th>
        <th>Aksi</th>
    </tr>`;

    data.forEach((d,i)=>{
        html += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.waktu}</td>
            <td><button onclick="hapus(${i})">Hapus</button></td>
        </tr>`;
    });

    tabel.innerHTML = html;
}

// ===== AUTO LOGIN =====
if(getSession()){
    startApp();
}

</script>

</body>
</html>
