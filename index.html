<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login & Absensi Pro - UNPAM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}
.container{ margin-top:20px; }
input,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}
button{
    background-color:#4CAF50;
    color:white;
    cursor:pointer;
}
button:hover{
    background-color:#45a049;
}
.hidden{ display:none; }
table{
    margin:auto;
    background:white;
    color:black;
    border-collapse: collapse;
    width:90%;
}
td,th{
    border:1px solid black;
    padding:8px;
}
.unpam-logo{
    font-size:48px;
}
</style>
</head>

<body>

<div class="container" id="auth">
    <div class="unpam-logo">🏛️</div>
    <h2>UNIVERSITAS PAMULANG</h2>

    <h3>Login</h3>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="msg"></p>

    <hr>

    <h3>Register</h3>
    <input id="reg_user" placeholder="Username"><br>
    <input id="reg_pass" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
</div>

<div class="container hidden" id="app">
    <div class="unpam-logo">🏛️</div>
    <h2 id="welcome"></h2>
    <h3 id="jam"></h3>
    <h3 id="total"></h3>

    <input id="nama" placeholder="Nama">
    <button onclick="tambah()">Tambah Absen</button>
    <button onclick="logout()">Logout</button>

    <br><br>

    <input id="search" placeholder="Cari nama..." onkeyup="loadData()">

    <br><br>

    <table id="tabel"></table>
</div>

<script>

// ===== GANTI LINK BACKEND LU DISINI =====
const BASE_URL = "https://ea3bd0c5-1599-439c-ab7a-1cff4821a2e9-00-3cw8m4s5h9s39.pike.replit.dev";

// ===== ELEMENT =====
const user = document.getElementById("username");
const pass = document.getElementById("password");
const msg = document.getElementById("msg");
const auth = document.getElementById("auth");
const app = document.getElementById("app");
const welcome = document.getElementById("welcome");
const nama = document.getElementById("nama");
const tabel = document.getElementById("tabel");

// ===== SESSION =====
function setSession(u){ localStorage.setItem("session",u); }
function getSession(){ return localStorage.getItem("session"); }

// ===== JAM REALTIME =====
setInterval(()=>{
    const jamElem = document.getElementById("jam");
    if(jamElem) jamElem.innerText = "Jam: " + new Date().toLocaleTimeString();
},1000);

// ===== CEK SERVER =====
async function cekServer(){
    try{
        let res = await fetch(BASE_URL);
        if(res.ok){
            console.log("Server ON");
        } else {
            alert("Backend ERROR!");
        }
    }catch{
        alert("Backend OFFLINE!");
    }
}
cekServer();

// ===== REGISTER =====
async function register(){
    try{
        let u = document.getElementById("reg_user").value.trim();
        let p = document.getElementById("reg_pass").value.trim();

        if(!u || !p) return alert("Isi semua!");

        let res = await fetch(BASE_URL + "/register", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ username:u, password:p })
        });

        let data = await res.json();

        if(data.status === "success"){
            alert("Register berhasil!");
        }else{
            alert("User sudah ada!");
        }
    }catch{
        alert("Server error register!");
    }
}

// ===== LOGIN =====
async function login(){
    try{
        let u = user.value.trim();
        let p = pass.value.trim();

        if(!u || !p){
            msg.innerText = "Isi username & password!";
            return;
        }

        msg.innerText = "Loading...";

        let res = await fetch(BASE_URL + "/login", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ username:u, password:p })
        });

        if(!res.ok) throw new Error();

        let data = await res.json();

        if(data.status === "success"){
            setSession(u);
            msg.innerText = "";
            startApp();
        }else{
            msg.innerText = "Login gagal!";
        }

    }catch{
        msg.innerText = "Backend error / belum nyala!";
    }
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// ===== START APP =====
function startApp(){
    if(!getSession()) return;

    auth.classList.add("hidden");
    app.classList.remove("hidden");

    welcome.innerText = "Welcome, " + getSession();
    loadData();
}

// ===== TAMBAH =====
async function tambah(){
    try{
        let n = nama.value.trim();
        if(!n) return alert("Nama wajib!");

        let res = await fetch(BASE_URL + "/absen", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ nama:n })
        });

        let data = await res.json();

        if(data.status === "success"){
            nama.value = "";
            loadData();
        }
    }catch{
        alert("Error tambah!");
    }
}

// ===== HAPUS =====
async function hapus(i){
    try{
        await fetch(BASE_URL + "/absen/" + i, { method:"DELETE" });
        loadData();
    }catch{
        alert("Gagal hapus!");
    }
}

// ===== LOAD DATA =====
async function loadData(){
    try{
        let res = await fetch(BASE_URL + "/absen");
        let data = await res.json();

        let keyword = document.getElementById("search").value.toLowerCase();

        let html = `<tr><th>Nama</th><th>Waktu</th><th>Aksi</th></tr>`;

        let filtered = data.filter(d => d.nama.toLowerCase().includes(keyword));

        document.getElementById("total").innerText = "Total Absen: " + filtered.length;

        filtered.forEach((d,i)=>{
            html += `<tr>
                <td>${d.nama}</td>
                <td>${d.waktu}</td>
                <td><button onclick="hapus(${i})">Hapus</button></td>
            </tr>`;
        });

        tabel.innerHTML = html;

    }catch{
        console.log("Gagal load data");
    }
}

// ===== AUTO LOGIN =====
if(getSession()){
    startApp();
}

</script>

</body>
</html>
