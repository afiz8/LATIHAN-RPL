<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login & Absensi Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    text-align:center;
}
.container{ margin-top:40px; }
input,button{
    padding:10px;
    margin:5px;
}
.hidden{ display:none; }
table{
    margin:auto;
    background:white;
    color:black;
    border-collapse: collapse;
}
td,th{
    border:1px solid black;
    padding:8px;
}
</style>
</head>

<body>

<div class="container" id="auth">
    <h2>Login</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <hr>

    <h3>Register</h3>
    <input id="reg_user" placeholder="Username"><br>
    <input id="reg_pass" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
</div>

<div class="container hidden" id="app">
    <h2 id="welcome"></h2>

    <h3 id="jam"></h3>
    <h3 id="total"></h3>

    <input id="nama" placeholder="Nama">
    <button onclick="tambah()">Tambah Absen</button>
    <button onclick="logout()">Logout</button>

    <br><br>

    <input id="search" placeholder="Cari nama..." onkeyup="loadData()">

    <br><br>

    <table id="tabel"></table>
</div>

<script>

// ===== CONFIG =====
const BASE_URL = "https://cbf1487d-f619-4cdc-8f65-954cc75751c0-00-27ker2816xs3s.sisko.replit.dev";

// ===== ELEMENT =====
const user = document.getElementById("username");
const pass = document.getElementById("password");
const msg = document.getElementById("msg");
const auth = document.getElementById("auth");
const app = document.getElementById("app");
const welcome = document.getElementById("welcome");
const nama = document.getElementById("nama");
const tabel = document.getElementById("tabel");

// ===== SESSION =====
function setSession(u){
    localStorage.setItem("session",u);
}
function getSession(){
    return localStorage.getItem("session");
}

// ===== JAM REALTIME =====
setInterval(()=>{
    document.getElementById("jam").innerText =
        "Jam: " + new Date().toLocaleTimeString();
},1000);

// ===== CEK SERVER =====
async function cekServer(){
    try{
        await fetch(BASE_URL);
        console.log("Server ON");
    }catch{
        alert("Backend OFFLINE!");
    }
}
cekServer();

// ===== REGISTER =====
async function register(){
    let u = document.getElementById("reg_user").value.trim();
    let p = document.getElementById("reg_pass").value.trim();

    if(!u || !p) return alert("Isi semua!");
    if(p.length < 3) return alert("Password minimal 3!");

    let res = await fetch(BASE_URL + "/register", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ username:u, password:p })
    });

    let data = await res.json();

    if(data.status === "success"){
        alert("Register berhasil!");
    }else{
        alert("User sudah ada!");
    }
}

// ===== LOGIN =====
async function login(){
    try{
        let u = user.value.trim();
        let p = pass.value.trim();

        if(!u || !p){
            msg.innerText = "Isi username & password!";
            return;
        }

        msg.innerText = "Loading...";

        let res = await fetch(BASE_URL + "/login", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ username:u, password:p })
        });

        let data = await res.json();

        if(data.status === "success"){
            setSession(u);
            user.value="";
            pass.value="";
            msg.innerText="";
            startApp();
        }else{
            msg.innerText = "Login gagal!";
        }

    }catch(e){
        msg.innerText = "Server error!";
    }
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// ===== START =====
function startApp(){
    if(!getSession()) return;

    auth.classList.add("hidden");
    app.classList.remove("hidden");

    welcome.innerText = "Welcome, " + getSession();
    loadData();
}

// ===== TAMBAH =====
async function tambah(){
    let n = nama.value.trim();

    if(!n) return alert("Nama wajib diisi!");
    if(n.length < 2) return alert("Nama terlalu pendek!");

    let res = await fetch(BASE_URL + "/absen", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ nama:n })
    });

    let data = await res.json();

    if(data.status === "success"){
        msg.innerText = "Berhasil tambah!";
        nama.value="";
        loadData();
    }
}

// ===== HAPUS =====
async function hapus(i){
    await fetch(BASE_URL + "/absen/" + i, {
        method:"DELETE"
    });
    loadData();
}

// ===== LOAD =====
async function loadData(){
    let res = await fetch(BASE_URL + "/absen");
    let data = await res.json();

    let keyword = document.getElementById("search").value.toLowerCase();

    let html = `
    <tr>
        <th>Nama</th>
        <th>Waktu</th>
        <th>Aksi</th>
    </tr>`;

    let filtered = data.filter(d =>
        d.nama.toLowerCase().includes(keyword)
    );

    document.getElementById("total").innerText =
        "Total Absen: " + filtered.length;

    filtered.forEach((d,i)=>{
        html += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.waktu}</td>
            <td><button onclick="hapus(${i})">Hapus</button></td>
        </tr>`;
    });

    tabel.innerHTML = html;
}

// ===== AUTO LOGIN =====
if(getSession()){
    startApp();
}

</script>

</body>
</html>
