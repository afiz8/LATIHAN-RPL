<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    text-align: center;
}
.container {
    margin: 20px auto;
    width: 350px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}
button {
    background: #00c9a7;
    color: white;
}
.hidden { display: none; }
table {
    width: 100%;
    margin-top: 10px;
    background: white;
    color: black;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div id="auth">
    <h2>Login / Register</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<div id="app" class="hidden">
    <h2>Absensi 🚀</h2>
    <p id="welcome"></p>

    <input id="nama" placeholder="Nama">
    <button onclick="tambah()">Tambah Absen</button>

    <table id="tabel">
        <tr>
            <th>Nama</th>
            <th>Waktu</th>
            <th>Aksi</th>
        </tr>
    </table>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
// HASH
async function hashPassword(password) {
    const data = new TextEncoder().encode(password);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2,'0')).join('');
}

// USER
function getUsers(){ return JSON.parse(localStorage.getItem("users"))||[]; }
function saveUsers(u){ localStorage.setItem("users",JSON.stringify(u)); }

// SESSION
function setSession(u){ localStorage.setItem("session",u); }
function getSession(){ return localStorage.getItem("session"); }

// REGISTER
async function register(){
    let u=user.value.trim();
    let p=pass.value.trim();
    if(!u||!p) return msg.innerText="Isi semua!";
    let users=getUsers();
    if(users.find(x=>x.username===u)) return msg.innerText="User ada!";
    let h=await hashPassword(p);
    users.push({username:u,password:h});
    saveUsers(users);
    msg.innerText="Register sukses!";
}

// LOGIN
async function login(){
    let u=user.value.trim();
    let p=pass.value.trim();
    let h=await hashPassword(p);
    let users=getUsers();
    let found=users.find(x=>x.username===u && x.password===h);
    if(found){
        setSession(u);
        startApp();
    } else {
        msg.innerText="Login gagal!";
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// APP
function startApp(){
    auth.classList.add("hidden");
    app.classList.remove("hidden");
    welcome.innerText="Welcome, "+getSession();
    loadData();
}

// DATA ABSEN
function getData(){
    return JSON.parse(localStorage.getItem("absen"))||[];
}

function saveData(d){
    localStorage.setItem("absen",JSON.stringify(d));
}

// TAMBAH
function tambah(){
    let n=nama.value.trim();
    if(!n) return;
    let data=getData();
    data.push({
        nama:n,
        waktu:new Date().toLocaleString()
    });
    saveData(data);
    nama.value="";
    loadData();
}

// HAPUS
function hapus(i){
    let data=getData();
    data.splice(i,1);
    saveData(data);
    loadData();
}

// LOAD TABLE
function loadData(){
    let data=getData();
    let html = `
    <tr>
        <th>Nama</th>
        <th>Waktu</th>
        <th>Aksi</th>
    </tr>`;
    data.forEach((d,i)=>{
        html += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.waktu}</td>
            <td><button onclick="hapus(${i})">Hapus</button></td>
        </tr>`;
    });
    tabel.innerHTML=html;
}

// AUTO LOGIN
if(getSession()) startApp();
</script>

</body>
</html>
