<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi Secure Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color: white;
    text-align: center;
}
.container {
    margin: 20px auto;
    width: 350px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: none;
}
button { background: #00c9a7; }
.hidden { display: none; }
table {
    width: 100%;
    margin-top: 10px;
    background: white;
    color: black;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<div id="auth">
    <h2>Login / Register</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <p id="msg"></p>
</div>

<div id="app" class="hidden">
    <h2>Absensi 🚀</h2>
    <p id="welcome"></p>

    <input id="nama" placeholder="Nama">
    <button onclick="tambah()">Tambah Absen</button>

    <table id="tabel"></table>

    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
// ===== HASH PASSWORD =====
async function hashPassword(password) {
    const data = new TextEncoder().encode(password);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2,'0')).join('');
}

// ===== USER STORAGE =====
function getUsers(){ return JSON.parse(localStorage.getItem("users"))||[]; }
function saveUsers(u){ localStorage.setItem("users",JSON.stringify(u)); }

// ===== SESSION =====
function setSession(u){ localStorage.setItem("session",u); }
function getSession(){ return localStorage.getItem("session"); }

// ===== VALIDASI =====
function validUsername(u){
    return /^[a-zA-Z0-9]{3,}$/.test(u);
}

// ===== REGISTER =====
async function register(){
    try{
        let u=user.value.trim();
        let p=pass.value.trim();

        if(!u || !p) return msg.innerText="Semua field wajib!";
        if(!validUsername(u)) return msg.innerText="Username min 3 huruf/angka!";
        if(p.length < 6) return msg.innerText="Password min 6 karakter!";

        let users=getUsers();

        if(users.find(x=>x.username.toLowerCase()===u.toLowerCase())){
            return msg.innerText="Username sudah ada!";
        }

        let h=await hashPassword(p);

        users.push({username:u,password:h});
        saveUsers(users);

        console.log("Register:", u);
        msg.innerText="Register berhasil!";
    }catch(e){
        alert("Error register!");
    }
}

// ===== LOGIN =====
async function login(){
    try{
        let u=user.value.trim();
        let p=pass.value.trim();

        let h=await hashPassword(p);
        let users=getUsers();

        let found=users.find(x=>
            x.username.toLowerCase()===u.toLowerCase() &&
            x.password===h
        );

        if(found){
            setSession(u);
            console.log("Login:", u);
            startApp();
        } else {
            msg.innerText="Login gagal!";
        }
    }catch(e){
        alert("Error login!");
    }
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("session");
    location.reload();
}

// ===== APP =====
function startApp(){
    if(!getSession()) return location.reload();

    auth.classList.add("hidden");
    app.classList.remove("hidden");
    welcome.innerText="Welcome, "+getSession();
    loadData();
}

// ===== DATA =====
function getData(){
    return JSON.parse(localStorage.getItem("absen"))||[];
}
function saveData(d){
    localStorage.setItem("absen",JSON.stringify(d));
}

// ===== TAMBAH =====
function tambah(){
    try{
        let n=nama.value.trim();
        if(!n) return alert("Nama wajib diisi!");

        let data=getData();

        // ANTI DUPLIKAT
        if(data.find(d=>d.nama.toLowerCase()===n.toLowerCase())){
            return alert("Nama sudah absen!");
        }

        data.push({
            nama:n,
            waktu:new Date().toLocaleString()
        });

        saveData(data);
        console.log("Tambah absen:", n);

        nama.value="";
        loadData();
    }catch(e){
        alert("Error tambah data!");
    }
}

// ===== HAPUS =====
function hapus(i){
    let data=getData();
    data.splice(i,1);
    saveData(data);
    loadData();
}

// ===== LOAD TABLE =====
function loadData(){
    let data=getData();

    let html = `
    <tr>
        <th>Nama</th>
        <th>Waktu</th>
        <th>Aksi</th>
    </tr>`;

    data.forEach((d,i)=>{
        html += `
        <tr>
            <td>${d.nama}</td>
            <td>${d.waktu}</td>
            <td><button onclick="hapus(${i})">Hapus</button></td>
        </tr>`;
    });

    tabel.innerHTML = html;
}

// ===== AUTO LOGIN =====
if(getSession()) startApp();
</script>

</body>
</html>
