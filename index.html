<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login System Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 { text-align: center; }

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover { background: #5a67d8; }

.switch {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: blue;
}

.hidden { display: none; }

.dashboard { text-align: center; }

.msg {
    text-align: center;
    font-size: 14px;
    margin: 5px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginForm">
    <h2>Login</h2>
    <div class="msg" id="loginMsg"></div>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="switch" onclick="showRegister()">Belum punya akun? Daftar</div>
</div>

<!-- REGISTER -->
<div id="registerForm" class="hidden">
    <h2>Register</h2>
    <div class="msg" id="regMsg"></div>
    <input type="text" id="regUser" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <div class="switch" onclick="showLogin()">Sudah punya akun? Login</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden dashboard">
    <h2>Welcome 👋</h2>
    <p id="userDisplay"></p>
    <button onclick="logout()">Logout</button>
</div>

</div>

<script>
// ambil semua user
function getUsers() {
    return JSON.parse(localStorage.getItem("users")) || [];
}

// simpan user
function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

// REGISTER
function register() {
    let user = document.getElementById("regUser").value.trim();
    let pass = document.getElementById("regPass").value.trim();
    let msg = document.getElementById("regMsg");

    if(user === "" || pass === "") {
        msg.innerText = "Isi semua data!";
        msg.style.color = "red";
        return;
    }

    let users = getUsers();

    // cek user sudah ada
    let exists = users.find(u => u.username.toLowerCase() === user.toLowerCase());
    if(exists) {
        msg.innerText = "Username sudah digunakan!";
        msg.style.color = "red";
        return;
    }

    users.push({ username: user, password: pass });
    saveUsers(users);

    msg.innerText = "Register berhasil!";
    msg.style.color = "green";
}

// LOGIN
function login() {
    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();
    let msg = document.getElementById("loginMsg");

    let users = getUsers();

    let found = users.find(u =>
        u.username.toLowerCase() === user.toLowerCase() &&
        u.password === pass
    );

    if(found) {
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        document.getElementById("userDisplay").innerText = found.username;
    } else {
        msg.innerText = "Username atau Password salah!";
        msg.style.color = "red";
    }
}

// LOGOUT
function logout() {
    location.reload();
}

// SWITCH
function showRegister() {
    document.getElementById("loginForm").classList.add("hidden");
    document.getElementById("registerForm").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerForm").classList.add("hidden");
    document.getElementById("loginForm").classList.remove("hidden");
}
</script>

</body>
</html>
